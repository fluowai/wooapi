services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass redis-super-seguro-wooapi-2026
    environment:
      REDIS_PASSWORD: "redis-super-seguro-wooapi-2026"
    volumes:
      - wooapi_redis_data:/data
    networks:
      - wooapi_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      restart_policy:
        condition: any

  wooapi:
    image: ghcr.io/fluowai/wooapi:latest
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://127.0.0.1:3001
      NODE_URL: http://127.0.0.1:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
      BRIDGE_MEDIA_CACHE_DIR: /data/media-cache
    volumes:
      - wooapi_data:/data
    networks:
      - woopanel1
      - wooapi_internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=woopanel1"
        - "traefik.http.routers.wooapi.rule=Host(`painel.wooapi.com.br`) || Host(`wooapi.com.br`) || Host(`wooapi.consultio.com.br`)"
        - "traefik.http.routers.wooapi.entrypoints=websecure"
        - "traefik.http.routers.wooapi.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.wooapi.priority=1"
        - "traefik.http.routers.wooapi.service=wooapi"
        - "traefik.http.services.wooapi.loadbalancer.server.port=3000"

  wooapi-webhook-worker:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:webhooks"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wooapi-message-worker:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:messages"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wooapi-monitor-worker:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:monitor"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wooapi-orchestrator:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:orchestrator"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wooapi-alert-worker:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:alerts"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wooapi-cleanup-worker:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:cleanup"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wooapi-chatwoot-worker:
    image: ghcr.io/fluowai/wooapi:latest
    command: ["sh", "-c", "sleep 30 && npm run worker:chatwoot"]
    healthcheck:
      disable: true
    environment:
      <<: *wooapi_env
      BRIDGE_URL: http://wooapi:3001
      NODE_URL: http://wooapi:3000
      BRIDGE_DB_PATH: /data/wooapi_bridge.db
    volumes:
      - wooapi_data:/data
    networks:
      - wooapi_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  wooapi_data:
  wooapi_redis_data:

networks:
  woopanel1:
    external: true
    name: woopanel1
  wooapi_internal:
    driver: overlay
