<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#13C12A" />
    <title>Wozapi offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8f6;
        color: #101511;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #dfe7e1;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 48px rgba(16, 21, 17, 0.08);
      }

      img {
        width: 56px;
        height: 56px;
        object-fit: contain;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #637168;
        line-height: 1.6;
      }

      a {
        margin-top: 22px;
        display: inline-flex;
        border-radius: 8px;
        background: #13C12A;
        color: #ffffff;
        padding: 12px 16px;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/wozapi-logo.png" alt="Wozapi" />
      <h1>Sem conexao no momento</h1>
      <p>O app Wozapi esta instalado e pronto para voltar assim que a internet ou o servidor local responder novamente.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
